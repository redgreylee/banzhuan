<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>套利监控终端 v2.5</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .row-ev-enter-active { transition: all 0.3s ease-out; }
        .row-ev-enter-from { opacity: 0; transform: translateX(-10px); }
    </style>
</head>
<body class="bg-[#050505] text-zinc-300 font-mono">
    <div id="app" class="p-4 max-w-[1200px] mx-auto">
        <div class="grid grid-cols-3 gap-4 mb-6">
            <div v-for="(v, k) in { '交易所': stats.ex, '监控对': stats.sym, '发现机会': stats.total }" 
                 class="bg-zinc-900/50 border border-zinc-800 p-4 rounded-xl">
                <div class="text-[10px] text-zinc-500 uppercase font-bold">{{k}}</div>
                <div class="text-2xl font-black text-white" :class="k==='发现机会'?'text-emerald-400':''">{{v || 0}}</div>
            </div>
        </div>

        <div class="bg-zinc-900 rounded-xl border border-zinc-800 overflow-hidden shadow-2xl">
            <table class="w-full text-left text-sm">
                <thead class="bg-zinc-950 text-zinc-600 text-[10px] uppercase">
                    <tr>
                        <th class="p-4">时间/币种</th>
                        <th class="p-4 text-center">执行路径</th>
                        <th class="p-4 text-right">买入深度 (USDT)</th>
                        <th class="p-4 text-right">卖出深度 (USDT)</th>
                        <th class="p-4 text-right">净利润</th>
                    </tr>
                </thead>
                <tbody class="divide-y divide-zinc-800/50">
                    <tr v-if="items.length === 0"><td colspan="5" class="p-20 text-center animate-pulse">正在侦听市场波动...</td></tr>
                    <transition-group name="row-ev">
                        <tr v-for="i in items" :key="i.id" class="hover:bg-white/[0.02]">
                            <td class="p-4">
                                <div class="text-white font-bold">{{i.symbol}}</div>
                                <div class="text-[10px] text-zinc-600">{{i.time}}</div>
                            </td>
                            <td class="p-4">
                                <div class="flex items-center justify-center gap-2">
                                    <span class="px-1.5 py-0.5 rounded bg-emerald-500/10 text-emerald-500 text-[10px] font-black border border-emerald-500/20 uppercase">{{i.buy_ex}}</span>
                                    <span class="text-zinc-700">➜</span>
                                    <span class="px-1.5 py-0.5 rounded bg-red-500/10 text-red-500 text-[10px] font-black border border-red-500/20 uppercase">{{i.sell_ex}}</span>
                                </div>
                            </td>
                            <td class="p-4 text-right">
                                <div class="text-emerald-500 font-bold tracking-tighter">{{i.b_price}}</div>
                                <div class="text-[10px] text-zinc-600 font-normal">深度: {{i.b_vol}}</div>
                            </td>
                            <td class="p-4 text-right">
                                <div class="text-red-400 font-bold tracking-tighter">{{i.s_price}}</div>
                                <div class="text-[10px] text-zinc-600 font-normal">深度: {{i.s_vol}}</div>
                            </td>
                            <td class="p-4 text-right">
                                <div :class="i.profit > 2 ? 'bg-emerald-500 text-black shadow-[0_0_15px_rgba(16,185,129,0.3)]' : 'text-emerald-400'" 
                                     class="inline-block px-3 py-1 rounded-lg font-black text-lg">
                                    +{{i.profit}}%
                                </div>
                            </td>
                        </tr>
                    </transition-group>
                </tbody>
            </table>
        </div>
        <div class="text-[10px] text-zinc-700 mt-6 text-center uppercase tracking-widest">Global Arbitrage Node - Realtime Processing</div>
    </div>

    <script>
        const { createApp, ref, onMounted } = Vue;
        createApp({
            setup() {
                const items = ref([]);
                const stats = ref({});
                const update = async () => {
                    try {
                        const r = await fetch('http://127.0.0.1:8000/api/data');
                        const d = await r.json();
                        items.value = d.list;
                        stats.value = d.status;
                    } catch (e) { console.warn("Waiting for Backend..."); }
                };
                onMounted(() => { update(); setInterval(update, 1000); });
                return { items, stats };
            }
        }).mount('#app');
    </script>
</body>
</html>
